version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: claimsense-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-claimsense}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - claimsense-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claimsense-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Core Configuration
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-claimsense}
      
      # Authentication & Security
      CLAIMSENSE_AUTH_SECRET: ${CLAIMSENSE_AUTH_SECRET}
      CLAIMSENSE_DEMO_USER: ${CLAIMSENSE_DEMO_USER:-adjuster}
      CLAIMSENSE_DEMO_PASSWORD: ${CLAIMSENSE_DEMO_PASSWORD}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-168}
      
      # CORS Configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      
      # Gemini Configuration
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-models/text-embedding-004}
      
      # File Paths
      UPLOAD_DIR: /app/uploads
      REPORTS_DIR: /app/reports
      
      # Processing
      MIN_TEXT_CHARS_PER_PAGE: ${MIN_TEXT_CHARS_PER_PAGE:-40}
      
      # Python Environment
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    
    ports:
      - "${API_PORT:-8000}:8000"
    
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    
    networks:
      - claimsense-network
    
    restart: unless-stopped
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Production health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Limit resource usage
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  pgdata:
    driver: local

networks:
  claimsense-network:
    driver: bridge

