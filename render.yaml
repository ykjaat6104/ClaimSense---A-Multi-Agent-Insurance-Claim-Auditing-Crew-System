services:
  - type: web
    name: claimsense-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: claimsense-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://claimsense.vercel.app
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: "168"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: REPORTS_DIR
        value: ./reports
      - key: MIN_TEXT_CHARS_PER_PAGE
        value: "40"
      - key: LOG_LEVEL
        value: INFO
      - key: CLAIMSENSE_AUTH_SECRET
        sync: false
      - key: CLAIMSENSE_DEMO_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: claimsense-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
