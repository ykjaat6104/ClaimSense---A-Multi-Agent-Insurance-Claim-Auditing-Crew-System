[pytest]
# Pytest configuration for ClaimSense testing

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    e2e: End-to-end tests for full workflows
    slow: Slow running tests
    async: Asynchronous tests

# Coverage options
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -v

# Asyncio configuration
asyncio_mode = auto

# Database options
testpaths = tests

# Ignore patterns
norecursedirs = .git .venv venv __pycache__ *.egg-info .pytest_cache

# Timeout (seconds)
timeout = 300

# Log configuration
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG

# Coverage configuration
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

precision = 2
skip_covered = False
