# Alembic configuration file for ClaimSense
# The genesis of this file sticks with the following ideas, in order:
# 1. Most of the settings in the [alembic] section
#    come from the initial issue that had a request for
#    generic "make new migration template".
#    By default, this section was not present.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to be a tzinfo.tzname() method.
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in %(rev)s_%(slug)s
# This affects the length of the migration filename. It's length will
# be 27 + (decrease of this number) + filename
# When set to its default value of -1, the filename is unbounded
# in length.

sqlalchemy.url = 

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
